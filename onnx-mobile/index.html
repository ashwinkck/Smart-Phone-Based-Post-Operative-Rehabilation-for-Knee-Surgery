<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Pose Tracking</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="style.css" rel="stylesheet">
    <!-- ONNX Runtime Web -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4" style="background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);">
        <div class="container">
            <span class="navbar-brand">
                <i class="fas fa-running"></i> Mobile Pose Tracking
            </span>
        </div>
    </nav>

    <div class="container pb-5">
        <!-- Status Alert -->
        <div id="status-alert" class="alert alert-info" style="display: none;">
            Loading ONNX model... please wait.
        </div>

        <div class="card mb-3">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-video"></i> Live Camera</h5>
            </div>
            <div class="card-body p-2">
                <div class="video-container" style="position: relative; background: #000; border-radius: 10px; overflow: hidden; width: 100%; aspect-ratio: 3/4;">
                    <!-- Hidden video element to capture camera -->
                    <video id="video-feed" autoplay playsinline muted style="display: none;"></video>
                    <!-- Canvas element to draw the video and skeleton -->
                    <canvas id="output-canvas" style="width: 100%; height: 100%; object-fit: cover;"></canvas>
                </div>
                
                <div class="mt-3 text-center">
                    <button id="start-btn" class="btn btn-success me-2" disabled>
                        <i class="fas fa-play"></i> Start
                    </button>
                    <button id="stop-btn" class="btn btn-danger me-2" disabled>
                        <i class="fas fa-stop"></i> Stop
                    </button>
                    <button id="flip-camera-btn" class="btn btn-primary">
                        <i class="fas fa-camera-rotate"></i> Flip Camera
                    </button>
                </div>
                
                <div class="mt-3 d-flex justify-content-center">
                    <div class="btn-group" role="group">
                        <input type="radio" class="btn-check" name="leg-choice" id="left-leg" value="left" checked>
                        <label class="btn btn-outline-primary" for="left-leg">
                            <i class="fas fa-user"></i> Left Leg
                        </label>
                        <input type="radio" class="btn-check" name="leg-choice" id="right-leg" value="right">
                        <label class="btn btn-outline-primary" for="right-leg">
                            <i class="fas fa-user"></i> Right Leg
                        </label>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-chart-line"></i> Angle Data</h5>
            </div>
            <div class="card-body">
                <div class="row text-center">
                    <div class="col-6">
                        <div class="angle-display p-2 bg-light rounded border">
                            <h6 class="text-muted mb-1">Raw Angle</h6>
                            <div id="raw-angle" class="fs-2 fw-bold text-primary">--°</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="angle-display p-2 bg-light rounded border">
                            <h6 class="text-muted mb-1">Stable Angle</h6>
                            <div id="stable-angle" class="fs-2 fw-bold text-success">--°</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Script -->
    <script src="app.js"></script>
</body>
</html>
